name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get install -y clang clang-tidy

      - name: Configure (generates compile_commands.json and fetches deps)
        env:
          CC: clang
          CXX: clang++
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build (ensures all dependency headers are generated)
        run: cmake --build build --parallel

      - name: Run clang-tidy
        run: find src tests -name '*.cpp' -print0 | xargs -0 clang-tidy -p build

  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get install -y clang-format

      - name: Check formatting
        run: git ls-files -- '*.cpp' '*.hpp' | xargs clang-format --dry-run --Werror
